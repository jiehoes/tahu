# Tahu API Worker
name = "tahu-api"
main = "src/index.ts"
compatibility_date = "2024-07-01"

# Disable workers.dev — only use custom domain
workers_dev = false
[[d1_databases]]
binding = "DB"
database_name = "tahu-db"
database_id = "dcf12a0a-a891-4304-84b4-5366f31b6764"

# R2 Bucket
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "tahu-documents"

# Environment
[vars]
LOG_LEVEL = "debug"
API_KEY = "tahu-dev-key-2026"
JWT_SECRET = "dev-secret-do-not-use-in-prod"

# Production
[env.production]
LOG_LEVEL = "info"

[env.production.vars]
JWT_SECRET = ""
API_KEY = ""

# Alias for workspace deps
[alias]
"@hono/zod-validator" = "../../node_modules/.pnpm/@hono+zod-validator@0.2.2_hono@4.12.27_zod@3.25.76/node_modules/@hono/zod-validator/dist/esm/index.js"
"@tahu/wiki" = "../../packages/wiki/src/index.ts"
"@tahu/parser" = "../../packages/parser/src/index.ts"
"@tahu/agent" = "../../packages/agent/src/index.ts"
"@tahu/mcp" = "../../packages/mcp/src/index.ts"
"@tahu/graph" = "../../packages/graph/src/index.ts"
